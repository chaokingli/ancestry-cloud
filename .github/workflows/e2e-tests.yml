name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest


    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup test database
        run: |
          npx prisma generate
          npx prisma db push

      - name: Create test user
        env:
          NODE_ENV: test
        run: |
          node -e "
            const { PrismaClient } = require('@prisma/client');
            const bcrypt = require('bcrypt');
            const prisma = new PrismaClient();

            async function createTestUser() {
              const hashedPassword = await bcrypt.hash('test-password-123', 10);
              await prisma.user.create({
                data: {
                  email: 'test-e2e@example.com',
                  password: hashedPassword,
                  name: 'E2E Test User',
                  role: 'USER',
                },
              });
              await prisma.\$disconnect();
            }

            createTestUser();
          "

      - name: Run E2E tests
        env:
          E2E_TEST_EMAIL: test-e2e@example.com
          E2E_TEST_PASSWORD: test-password-123
          E2E_TEST_NAME: E2E Test User
          E2E_BASE_URL: http://localhost:3000
          DATABASE_URL: file:./dev.db
          NEXTAUTH_SECRET: test-secret-for-e2e-tests
          NEXTAUTH_URL: http://localhost:3000
        run: npx playwright test --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  test-mobile:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup test database
        run: |
          npx prisma generate
          npx prisma db push

      - name: Create test user
        env:
          NODE_ENV: test
        run: |
          node -e "
            const { PrismaClient } = require('@prisma/client');
            const bcrypt = require('bcrypt');
            const prisma = new PrismaClient();

            async function createTestUser() {
              const hashedPassword = await bcrypt.hash('test-password-123', 10);
              await prisma.user.create({
                data: {
                  email: 'test-e2e@example.com',
                  password: hashedPassword,
                  name: 'E2E Test User',
                  role: 'USER',
                },
              });
              await prisma.\$disconnect();
            }

            createTestUser();
          "

      - name: Run mobile E2E tests
        env:
          E2E_TEST_EMAIL: test-e2e@example.com
          E2E_TEST_PASSWORD: test-password-123
          E2E_TEST_NAME: E2E Test User
          E2E_BASE_URL: http://localhost:3000
          DATABASE_URL: file:./dev.db
          NEXTAUTH_SECRET: test-secret-for-e2e-tests
          NEXTAUTH_URL: http://localhost:3000
        run: npx playwright test --project="Mobile Chrome"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mobile-report
          path: playwright-report/
          retention-days: 30